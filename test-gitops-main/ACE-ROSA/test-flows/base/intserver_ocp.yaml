apiVersion: appconnect.ibm.com/v1beta1
kind: IntegrationRuntime
metadata:
  name: $(params.project)-flows
  namespace: int
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  flowType:
    designerAPIFlow: false
    designerEventFlow: false
    toolkitFlow: true
  license:
    accept: true
    license: L-APEH-C79J9U
    use: CloudPakForIntegrationNonProduction
  template:
    spec:
      containers:
        - name: runtime
          image: '407690150649.dkr.ecr.us-east-1.amazonaws.com/openshift-cicd:replacewithbakedimage'
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 300m
              memory: 368Mi
            requests:
              cpu: 300m
              memory: 368Mi
      imagePullSecrets:
        - name: ecr-entitlement-key
  replicas: 1
  version: 12.0.3.0-r1
