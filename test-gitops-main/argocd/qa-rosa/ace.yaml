apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: $(params.project)-ace
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops ## incase of openshift change this to openshift-gitops
    server: https://kubernetes.default.svc
  project: $(params.project)
  source:
    path: ACE-ROSA/argocd/qa/  ## path where it reads other argo manifists
    repoURL: https://github.com/TapestryESB/$(params.repo)-gitops.git
    targetRevision: main
