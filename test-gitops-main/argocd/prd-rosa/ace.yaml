apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-ace
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops ## incase of openshift change this to openshift-gitops
    server: https://kubernetes.default.svc
  project: test ## argo cd project
  source:
    path: ACE-ROSA/argocd/prd/  ## path where it reads other argo manifists
    repoURL: https://github.com/TapestryESB/test-gitops.git
    targetRevision: main
