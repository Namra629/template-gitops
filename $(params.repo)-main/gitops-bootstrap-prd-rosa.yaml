apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: $(params.project)-bootstrap
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: $(params.project)
  source:
    path: argocd/prd-rosa/
    repoURL: https://github.com/TapestryESB/$(params.repo)-gitops.git
